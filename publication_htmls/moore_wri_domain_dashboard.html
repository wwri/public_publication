<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Moore Requests | WRI 2024 Domain Scores</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root {
      --bg: #0f1f24;
      --panel: #142a31;
      --panel2: #18343c;
      --ink: #eef7f5;
      --muted: #9db5b7;
      --line: rgba(255,255,255,0.12);
      --green: #2f8f83;
      --gold: #d7c64a;
      --orange: #e49a3a;
      --red: #d95f3d;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: var(--ink); background: var(--bg); }
    #app { display: grid; grid-template-columns: 380px 1fr; height: 100vh; }
    aside { background: linear-gradient(180deg, #10252b, #0b191d); border-right: 1px solid var(--line); padding: 18px; overflow: auto; }
    #map { height: 100vh; width: 100%; background: #dce9ec; }
    .eyebrow { color: #7ed5bd; font-size: 12px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; }
    h1 { margin: 5px 0 6px; font-size: 24px; line-height: 1.05; }
    .lede { color: var(--muted); font-size: 13px; line-height: 1.45; margin-bottom: 16px; }
    .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 14px 0 16px; }
    .card { background: rgba(255,255,255,0.06); border: 1px solid var(--line); border-radius: 14px; padding: 12px; }
    .card .num { font-size: 26px; font-weight: 800; }
    .card .lbl { color: var(--muted); font-size: 12px; }
    .controls { display: grid; gap: 9px; margin-bottom: 14px; }
    input, select { width: 100%; color: var(--ink); background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 10px 11px; outline: none; }
    input::placeholder { color: #799195; }
    .legend { display: flex; align-items: center; gap: 8px; color: var(--muted); font-size: 12px; margin: 12px 0 14px; }
    .ramp { flex: 1; height: 8px; border-radius: 999px; background: linear-gradient(90deg, var(--red), var(--orange), var(--gold), #82b95d, var(--green)); }
    #list { display: grid; gap: 9px; }
    .region { background: rgba(255,255,255,0.06); border: 1px solid var(--line); border-radius: 14px; padding: 11px; cursor: pointer; transition: 0.15s ease; }
    .region:hover { transform: translateY(-1px); border-color: rgba(126,213,189,0.55); }
    .region.active { border-color: #7ed5bd; background: rgba(126,213,189,0.13); }
    .regionTop { display: flex; gap: 10px; align-items: center; justify-content: space-between; }
    .regionName { font-size: 14px; font-weight: 750; }
    .regionMeta { margin-top: 3px; color: var(--muted); font-size: 12px; }
    .scoreDot { min-width: 48px; height: 34px; border-radius: 999px; display: grid; place-items: center; color: white; font-weight: 850; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.22); }
    .leaflet-popup-content-wrapper { border-radius: 16px; box-shadow: 0 14px 40px rgba(0,0,0,0.28); }
    .leaflet-popup-content { margin: 0; width: 440px !important; max-height: 560px; overflow: auto; }
    .popup { color: #17262b; }
    .popupHeader { padding: 14px 16px; color: white; background: linear-gradient(135deg, #16353d, #2f8f83); border-radius: 16px 16px 0 0; }
    .popupHeader h2 { margin: 0; font-size: 18px; }
    .popupHeader p { margin: 5px 0 0; color: rgba(255,255,255,0.78); font-size: 12px; }
    .popupBody { padding: 12px 16px 16px; }
    .locale { border-top: 1px solid #e6ecee; padding-top: 12px; margin-top: 12px; }
    .locale:first-child { border-top: 0; margin-top: 0; padding-top: 0; }
    .localeTitle { display: flex; justify-content: space-between; gap: 12px; align-items: center; }
    .localeTitle strong { font-size: 14px; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 999px; background: #eaf4f1; color: #1b6862; font-size: 11px; font-weight: 700; white-space: nowrap; }
    .sub { color: #617176; font-size: 12px; margin: 4px 0 9px; }
    .note { color: #617176; background: #f4f7f8; border-radius: 9px; padding: 7px 8px; font-size: 12px; margin-bottom: 10px; }
    .barRow { display: grid; grid-template-columns: 125px 1fr 44px; gap: 8px; align-items: center; font-size: 12px; margin: 6px 0; }
    .barTrack { height: 8px; background: #e8eef0; border-radius: 999px; overflow: hidden; }
    .bar { height: 100%; border-radius: 999px; }
    .barVal { text-align: right; font-variant-numeric: tabular-nums; font-weight: 700; }
    .overall { display: grid; grid-template-columns: 80px 1fr; gap: 10px; align-items: center; margin-bottom: 8px; }
    .overallScore { height: 50px; border-radius: 14px; display: grid; place-items: center; color: white; font-size: 20px; font-weight: 850; }
    .overallText { color: #617176; font-size: 12px; }
    .leaflet-interactive { transition: fill-opacity 0.15s ease, weight 0.15s ease; }
    @media (max-width: 850px) { #app { grid-template-columns: 1fr; grid-template-rows: 46vh 54vh; } aside { order: 2; } #map { height: 46vh; } }
  </style>
</head>

  <main><div id="map"></div></main>
</div>

, 65.43310900051792], [-146.52682899966817, 65.41511999950416], [-146.4878089997287, 65.38582699954968], [-146.54865399963427, 65.34500299961307], [-146.6174629995275, 65.34232799961718], [-146.71847500041233, 65.31860899965399], [-146.72467800040275, 65.30371299967707], [-146.78360600031127, 65.30624899967319], [-146.9093430001161, 65.27149599972714], [-147.03128199992682, 65.28994699969854], [-147.1196249997897, 65.27247499972559], [-147.15306899973777, 65.28807899970133], [-147.3298090005051, 65.27339999972413], [-147.5577710001513, 65.20989499982271]]]}}]};
let selectedId = null;
let layerById = new Map();
const map = L.map('map', { zoomControl: false, preferCanvas: true });
L.control.zoom({ position: 'bottomright' }).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  maxZoom: 18,
  attribution: '&copy; OpenStreetMap &copy; CARTO'
}).addTo(map);

function esc(s) {
  return String(s ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}

function popupHtml(props) {
  return `<div class="popup">
    <div class="popupHeader">
      <h2>${esc(props.matchedFeature)}</h2>
      <p>${esc(props.geometrySource)} | ${props.rows.length} request row${props.rows.length === 1 ? '' : 's'}</p>
    </div>
    <div class="popupBody">
      ${props.rows.map(r => `
        <div class="locale">
          <div class="localeTitle"><strong>${esc(r.locale)}</strong><span class="badge">${esc(r.sparkOrComparison)}</span></div>
          <div class="sub">${esc(r.spark)} | ${esc(r.localeType)} | ${esc(r.confidence)} confidence</div>
          <div class="overall"><div class="overallScore" style="background:${r.overallColor}">${r.overall ?? '--'}</div><div class="overallText">Mean of available domain scores for this request row.</div></div>
          <div class="note">${esc(r.notes)}</div>
          ${r.scores.map(s => `
            <div class="barRow">
              <div>${esc(s.name)}</div>
              <div class="barTrack"><div class="bar" style="width:${s.value ?? 0}%;background:${s.color}"></div></div>
              <div class="barVal">${s.value ?? '--'}</div>
            </div>
          `).join('')}
        </div>
      `).join('')}
    </div>
  </div>`;
}

function styleFeature(f) {
  return {
    color: '#0f4f4a',
    weight: f.properties._id === selectedId ? 3 : 1.4,
    opacity: 0.95,
    fillColor: f.properties.featureColor,
    fillOpacity: f.properties._id === selectedId ? 0.55 : 0.34
  };
}

data.features.forEach((f, i) => f.properties._id = i);
const geoLayer = L.geoJSON(data, {
  style: styleFeature,
  onEachFeature: (feature, layer) => {
    layerById.set(feature.properties._id, layer);
    layer.bindPopup(popupHtml(feature.properties), { maxWidth: 460, closeButton: true });
    layer.on('click', () => selectFeature(feature.properties._id, true));
    layer.on('mouseover', () => layer.setStyle({ weight: 2.8, fillOpacity: 0.52 }));
    layer.on('mouseout', () => geoLayer.resetStyle(layer));
  }
}).addTo(map);
map.fitBounds(geoLayer.getBounds(), { padding: [24, 24] });

function regionMatches(feature, query, filter) {
  const text = JSON.stringify(feature.properties.rows).toLowerCase() + ' ' + feature.properties.matchedFeature.toLowerCase();
  const queryOk = !query || text.includes(query.toLowerCase());
  const filterOk = filter === 'all' || feature.properties.rows.some(r => r.sparkOrComparison === filter);
  return queryOk && filterOk;
}

function selectFeature(id, openPopup=false) {
  selectedId = id;
  geoLayer.setStyle(styleFeature);
  document.querySelectorAll('.region').forEach(el => el.classList.toggle('active', Number(el.dataset.id) === id));
  const layer = layerById.get(id);
  if (layer) {
    layer.setStyle(styleFeature(layer.feature));
    if (openPopup) layer.openPopup();
  }
}

function renderList() {
  const query = document.getElementById('search').value;
  const filter = document.getElementById('filter').value;
  const list = document.getElementById('list');
  list.innerHTML = '';
  data.features
    .filter(f => regionMatches(f, query, filter))
    .sort((a, b) => (b.properties.featureScore ?? -1) - (a.properties.featureScore ?? -1))
    .forEach(f => {
      const first = f.properties.rows[0];
      const el = document.createElement('div');
      el.className = 'region';
      el.dataset.id = f.properties._id;
      el.innerHTML = `<div class="regionTop"><div><div class="regionName">${esc(f.properties.matchedFeature)}</div><div class="regionMeta">${f.properties.rows.length} row(s) | first: ${esc(first.locale)}</div></div><div class="scoreDot" style="background:${f.properties.featureColor}">${f.properties.featureScore ?? '--'}</div></div>`;
      el.onclick = () => {
        selectFeature(f.properties._id, true);
        const layer = layerById.get(f.properties._id);
        if (layer) map.fitBounds(layer.getBounds(), { maxZoom: 8, padding: [40, 40] });
      };
      list.appendChild(el);
    });
}

document.getElementById('search').addEventListener('input', renderList);
document.getElementById('filter').addEventListener('change', renderList);
renderList();
</script>
